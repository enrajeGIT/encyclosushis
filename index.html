<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寿司ネタ図鑑 — Encyclopédie des poissons à sushi</title>
<meta name="description" content="Encyclopédie des neta : les poissons et fruits de mer du sushi, avec leurs noms japonais, français et anglais, leur goût et leurs régions de pêche.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --washi:#FAF8F1;      /* papier */
    --sumi:#26292E;       /* encre */
    --sumi-soft:#5A5F66;
    --kon:#1C3352;        /* indigo japonais */
    --kon-deep:#132540;
    --shu:#C73E3A;        /* vermillon du sceau */
    --mist:#EAEEF2;       /* bleu pâle */
    --line:#DDD8CB;
    --radius:10px;
    --font-display:"Shippori Mincho", serif;
    --font-body:"Zen Kaku Gothic New", sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--font-body);
    background:var(--washi);
    color:var(--sumi);
    line-height:1.65;
  }
  img{display:block;max-width:100%}
  button{font-family:inherit;cursor:pointer}

  /* ---------- En-tête (noren indigo + vagues seigaiha) ---------- */
  .site-header{
    background:
      url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="40" viewBox="0 0 80 40"><g fill="none" stroke="%23FFFFFF" stroke-opacity="0.07" stroke-width="1.6"><circle cx="0" cy="40" r="36"/><circle cx="0" cy="40" r="28"/><circle cx="0" cy="40" r="20"/><circle cx="0" cy="40" r="12"/><circle cx="80" cy="40" r="36"/><circle cx="80" cy="40" r="28"/><circle cx="80" cy="40" r="20"/><circle cx="80" cy="40" r="12"/><circle cx="40" cy="20" r="36"/><circle cx="40" cy="20" r="28"/><circle cx="40" cy="20" r="20"/><circle cx="40" cy="20" r="12"/></g></svg>'),
      linear-gradient(160deg, var(--kon) 0%, var(--kon-deep) 100%);
    color:#F5F2E8;
    padding:56px 24px 48px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .site-header .kanji-title{
    font-family:var(--font-display);
    font-weight:800;
    font-size:clamp(2.6rem, 6vw, 4.2rem);
    letter-spacing:.12em;
    line-height:1.15;
  }
  .site-header .subtitle{
    margin-top:14px;
    font-size:clamp(1rem, 2vw, 1.2rem);
    letter-spacing:.22em;
    text-transform:uppercase;
    color:#C9D4E2;
    font-weight:500;
  }
  .site-header .hanko{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    margin-top:22px;
    width:52px;height:52px;
    border:2px solid var(--shu);
    color:#F5F2E8;
    background:var(--shu);
    border-radius:8px;
    font-family:var(--font-display);
    font-weight:600;
    font-size:1.25rem;
    letter-spacing:.05em;
    writing-mode:vertical-rl;
    box-shadow:0 3px 12px rgba(0,0,0,.25);
  }

  /* ---------- Barre outils ---------- */
  .toolbar{
    position:sticky;top:0;z-index:20;
    background:rgba(250,248,241,.94);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
    padding:14px clamp(16px,4vw,40px);
  }
  .toolbar-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
  .search-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .search-box{
    flex:1;min-width:220px;position:relative;
  }
  .search-box input{
    width:100%;
    font-family:var(--font-body);
    font-size:1rem;
    padding:11px 16px 11px 42px;
    border:1.5px solid var(--line);
    border-radius:999px;
    background:#fff;
    color:var(--sumi);
    transition:border-color .2s;
  }
  .search-box input:focus{outline:none;border-color:var(--kon)}
  .search-box input:focus-visible{outline:2px solid var(--kon);outline-offset:2px}
  .search-box svg{
    position:absolute;left:15px;top:50%;transform:translateY(-50%);
    width:17px;height:17px;stroke:var(--sumi-soft);fill:none;stroke-width:2;
  }
  .count{
    font-size:.88rem;color:var(--sumi-soft);white-space:nowrap;
  }
  .count strong{color:var(--shu);font-weight:700}

  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{
    border:1.5px solid var(--line);
    background:#fff;
    color:var(--sumi-soft);
    border-radius:6px;
    padding:6px 13px;
    font-size:.86rem;
    font-weight:500;
    transition:all .15s;
  }
  .chip:hover{border-color:var(--kon);color:var(--kon)}
  .chip:focus-visible{outline:2px solid var(--kon);outline-offset:2px}
  .chip.active{
    background:var(--kon);
    border-color:var(--kon);
    color:#fff;
  }

  /* ---------- Grille de fiches ---------- */
  main{max-width:1200px;margin:0 auto;padding:34px clamp(16px,4vw,40px) 80px}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(235px, 1fr));
    gap:22px;
  }
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    text-align:left;
    display:flex;flex-direction:column;
    transition:transform .18s ease, box-shadow .18s ease;
    padding:0;
  }
  .card:hover{transform:translateY(-4px);box-shadow:0 10px 26px rgba(28,51,82,.14)}
  .card:focus-visible{outline:3px solid var(--kon);outline-offset:2px}
  .card-img{
    aspect-ratio:4/3;
    background:linear-gradient(150deg, var(--kon) 0%, var(--kon-deep) 100%);
    position:relative;overflow:hidden;
  }
  .card-img img{width:100%;height:100%;object-fit:cover}
  .kanji-ph{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);
    font-weight:600;
    color:rgba(255,255,255,.92);
    font-size:clamp(2.4rem, 5vw, 3.4rem);
    letter-spacing:.05em;
    background:
      url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="30" viewBox="0 0 60 30"><g fill="none" stroke="%23FFFFFF" stroke-opacity="0.08" stroke-width="1.3"><circle cx="0" cy="30" r="27"/><circle cx="0" cy="30" r="20"/><circle cx="0" cy="30" r="13"/><circle cx="60" cy="30" r="27"/><circle cx="60" cy="30" r="20"/><circle cx="60" cy="30" r="13"/><circle cx="30" cy="15" r="27"/><circle cx="30" cy="15" r="20"/><circle cx="30" cy="15" r="13"/></g></svg>'),
      linear-gradient(150deg, var(--kon) 0%, var(--kon-deep) 100%);
  }
  .card-body{padding:15px 17px 17px;display:flex;flex-direction:column;gap:3px;flex:1}
  .card-jp{
    display:flex;align-items:baseline;gap:9px;
  }
  .card-jp .kanji{
    font-family:var(--font-display);
    font-weight:800;
    font-size:1.55rem;
    color:var(--kon);
    line-height:1.2;
  }
  .card-jp .romaji{
    font-size:.85rem;color:var(--sumi-soft);letter-spacing:.04em;
  }
  .card-fr{font-weight:700;font-size:.98rem;line-height:1.35}
  .card-cat{
    margin-top:auto;padding-top:9px;
    font-size:.74rem;letter-spacing:.09em;text-transform:uppercase;
    color:var(--shu);font-weight:700;
  }
  .empty{
    grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--sumi-soft);
  }
  .empty .kanji{font-family:var(--font-display);font-size:3rem;color:var(--line);display:block;margin-bottom:12px}

  /* ---------- Fiche détaillée (modale) ---------- */
  .overlay{
    position:fixed;inset:0;z-index:50;
    background:rgba(19,37,64,.55);
    display:none;
    align-items:flex-start;justify-content:center;
    padding:5vh 16px 16px;
    overflow-y:auto;
  }
  .overlay.open{display:flex}
  .modal{
    background:var(--washi);
    border-radius:14px;
    max-width:780px;width:100%;
    position:relative;
    overflow:hidden;
    box-shadow:0 24px 70px rgba(0,0,0,.35);
    animation:rise .25s ease;
  }
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .modal-head{
    background:linear-gradient(160deg, var(--kon) 0%, var(--kon-deep) 100%);
    color:#F5F2E8;
    padding:30px 34px 26px;
    position:relative;overflow:hidden;
  }
  .modal-head .watermark{
    position:absolute;right:-10px;top:50%;transform:translateY(-50%);
    font-family:var(--font-display);font-weight:800;
    font-size:7.5rem;line-height:1;
    color:rgba(255,255,255,.07);
    pointer-events:none;white-space:nowrap;
  }
  .modal-head .kanji{
    font-family:var(--font-display);font-weight:800;
    font-size:2.6rem;line-height:1.15;
  }
  .modal-head .romaji{font-size:1.05rem;color:#C9D4E2;letter-spacing:.06em;margin-top:2px}
  .modal-head .cat-tag{
    display:inline-block;margin-top:12px;
    background:var(--shu);color:#fff;
    font-size:.74rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    padding:4px 12px;border-radius:4px;
  }
  .modal-close{
    position:absolute;top:14px;right:14px;z-index:2;
    width:38px;height:38px;border-radius:50%;
    border:none;background:rgba(255,255,255,.14);color:#fff;
    font-size:1.25rem;line-height:1;
    transition:background .15s;
  }
  .modal-close:hover{background:rgba(255,255,255,.28)}
  .modal-close:focus-visible{outline:2px solid #fff;outline-offset:2px}

  .modal-body{padding:26px 34px 36px}
  .photos{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:26px}
  .photo{border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);background:#fff}
  .photo .frame{aspect-ratio:4/3;position:relative;background:var(--mist)}
  .photo .frame img{width:100%;height:100%;object-fit:cover}
  .photo figcaption{
    padding:8px 12px;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;
    color:var(--sumi-soft);font-weight:700;border-top:1px solid var(--line);
  }

  .names{
    display:grid;grid-template-columns:repeat(3,1fr);gap:0;
    border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;background:#fff;margin-bottom:26px;
  }
  .names > div{padding:13px 16px}
  .names > div + div{border-left:1px solid var(--line)}
  .names .lang{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--shu);font-weight:700}
  .names .val{font-weight:700;margin-top:2px;font-size:.97rem;line-height:1.35}
  .names .val .k{font-family:var(--font-display);font-size:1.15rem;color:var(--kon);margin-right:6px}

  .section-title{
    font-family:var(--font-display);font-weight:600;
    font-size:1.15rem;color:var(--kon);
    display:flex;align-items:center;gap:10px;
    margin-bottom:10px;
  }
  .section-title::after{content:"";flex:1;height:1px;background:var(--line)}
  .gout{margin-bottom:26px}
  .regions ul{list-style:none}
  .regions li{
    position:relative;padding:7px 0 7px 24px;
  }
  .regions li + li{border-top:1px dashed var(--line)}
  .regions li::before{
    content:"";position:absolute;left:4px;top:15px;
    width:8px;height:8px;border-radius:50%;
    background:var(--shu);
  }

  footer{
    border-top:1px solid var(--line);
    padding:26px 20px 40px;text-align:center;
    color:var(--sumi-soft);font-size:.85rem;
  }
  footer .k{font-family:var(--font-display);color:var(--kon)}

  @media (max-width:640px){
    .photos{grid-template-columns:1fr}
    .names{grid-template-columns:1fr}
    .names > div + div{border-left:none;border-top:1px solid var(--line)}
    .modal-head{padding:24px 22px 22px}
    .modal-body{padding:22px 20px 30px}
    .modal-head .watermark{font-size:5rem}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>

<header class="site-header">
  <h1 class="kanji-title">寿司ネタ図鑑</h1>
  <p class="subtitle">Encyclopédie des poissons à sushi</p>
  <span class="hanko" aria-hidden="true">図鑑</span>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search-row">
      <div class="search-box">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        <input type="search" id="search" placeholder="Rechercher : maguro, thon, mackerel…" aria-label="Rechercher une espèce">
      </div>
      <div class="count" id="count" aria-live="polite"></div>
    </div>
    <div class="chips" id="chips" role="group" aria-label="Filtrer par catégorie"></div>
  </div>
</div>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <span class="k">寿司ネタ図鑑</span> — encyclopédie personnelle des neta · photos de poissons : Wikimedia Commons · photos de nigiri : collection personnelle
</footer>

<!-- Fiche détaillée -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal" id="modal"></div>
</div>

<script src="data.js"></script>
<script>
(function(){
  const grid = document.getElementById("grid");
  const chipsEl = document.getElementById("chips");
  const searchEl = document.getElementById("search");
  const countEl = document.getElementById("count");
  const overlay = document.getElementById("overlay");
  const modal = document.getElementById("modal");

  let activeCat = "all";
  let query = "";
  let lastFocus = null;

  /* ----- utilitaires ----- */
  const norm = s => (s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  const imgFish  = n => "images/poissons/" + n.id + ".jpg";
  const imgNigiri = n => "images/nigiris/" + n.id + ".jpg";

  // <img> avec repli automatique sur le kanji si l'image manque
  function imgOrKanji(src, alt, kanji){
    const wrap = document.createElement("div");
    wrap.style.cssText = "position:absolute;inset:0";
    const img = new Image();
    img.src = src; img.alt = alt; img.loading = "lazy";
    img.style.cssText = "width:100%;height:100%;object-fit:cover";
    img.onerror = () => {
      const ph = document.createElement("div");
      ph.className = "kanji-ph";
      ph.textContent = kanji;
      ph.setAttribute("aria-label", alt + " (image à venir)");
      wrap.replaceChildren(ph);
    };
    wrap.appendChild(img);
    return wrap;
  }

  /* ----- filtres par catégorie ----- */
  function buildChips(){
    const cats = [["all","Tout"], ...Object.entries(CATEGORIES)];
    cats.forEach(([key,label])=>{
      const b = document.createElement("button");
      b.className = "chip" + (key===activeCat ? " active" : "");
      b.textContent = label;
      b.dataset.cat = key;
      b.setAttribute("aria-pressed", key===activeCat);
      b.addEventListener("click", ()=>{
        activeCat = key;
        chipsEl.querySelectorAll(".chip").forEach(c=>{
          const on = c.dataset.cat===key;
          c.classList.toggle("active", on);
          c.setAttribute("aria-pressed", on);
        });
        render();
      });
      chipsEl.appendChild(b);
    });
  }

  /* ----- grille ----- */
  function matches(n){
    if(activeCat!=="all" && n.cat!==activeCat) return false;
    if(!query) return true;
    const hay = norm([n.kanji, n.romaji, n.fr, n.en, CATEGORIES[n.cat]].join(" "));
    return hay.includes(query);
  }

  function render(){
    grid.replaceChildren();
    const list = NETA.filter(matches);
    countEl.innerHTML = "<strong>" + list.length + "</strong> fiche" + (list.length>1?"s":"") + " / " + NETA.length;

    if(!list.length){
      const div = document.createElement("div");
      div.className = "empty";
      div.innerHTML = '<span class="kanji">空</span>Aucune espèce ne correspond à cette recherche.<br>Essayez un autre nom ou une autre catégorie.';
      grid.appendChild(div);
      return;
    }

    list.forEach(n=>{
      const card = document.createElement("button");
      card.className = "card";
      card.setAttribute("aria-label", "Voir la fiche : " + n.fr);

      const imgZone = document.createElement("div");
      imgZone.className = "card-img";
      imgZone.appendChild(imgOrKanji(imgNigiri(n), "Nigiri de " + n.fr, n.kanji));

      const body = document.createElement("div");
      body.className = "card-body";
      body.innerHTML =
        '<div class="card-jp"><span class="kanji">'+n.kanji+'</span><span class="romaji">'+n.romaji+'</span></div>' +
        '<div class="card-fr">'+n.fr+'</div>' +
        '<div class="card-cat">'+CATEGORIES[n.cat]+'</div>';

      card.append(imgZone, body);
      card.addEventListener("click", ()=>openModal(n));
      grid.appendChild(card);
    });
  }

  /* ----- fiche détaillée ----- */
  function openModal(n){
    lastFocus = document.activeElement;
    modal.replaceChildren();

    const head = document.createElement("div");
    head.className = "modal-head";
    head.innerHTML =
      '<div class="watermark" aria-hidden="true">'+n.kanji+'</div>' +
      '<div class="kanji" id="modal-title">'+n.kanji+'</div>' +
      '<div class="romaji">'+n.romaji+'</div>' +
      '<span class="cat-tag">'+CATEGORIES[n.cat]+'</span>';

    const close = document.createElement("button");
    close.className = "modal-close";
    close.innerHTML = "&#10005;";
    close.setAttribute("aria-label","Fermer la fiche");
    close.addEventListener("click", closeModal);
    head.appendChild(close);

    const body = document.createElement("div");
    body.className = "modal-body";

    // photos
    const photos = document.createElement("div");
    photos.className = "photos";
    [[imgFish(n), "Le poisson"], [imgNigiri(n), "Le nigiri"]].forEach(([src,label])=>{
      const fig = document.createElement("figure");
      fig.className = "photo";
      const frame = document.createElement("div");
      frame.className = "frame";
      frame.appendChild(imgOrKanji(src, label + " — " + n.fr, n.kanji));
      const cap = document.createElement("figcaption");
      cap.textContent = label;
      fig.append(frame, cap);
      photos.appendChild(fig);
    });

    // noms
    const names = document.createElement("div");
    names.className = "names";
    names.innerHTML =
      '<div><div class="lang">Japonais</div><div class="val"><span class="k">'+n.kanji+'</span>'+n.romaji+'</div></div>' +
      '<div><div class="lang">Français</div><div class="val">'+n.fr+'</div></div>' +
      '<div><div class="lang">Anglais</div><div class="val">'+n.en+'</div></div>';

    // goût
    const gout = document.createElement("div");
    gout.className = "gout";
    gout.innerHTML = '<div class="section-title">Goût &amp; texture</div><p>'+n.gout+'</p>';

    // régions
    const reg = document.createElement("div");
    reg.className = "regions";
    reg.innerHTML = '<div class="section-title">Régions de pêche</div><ul>' +
      n.regions.map(r=>"<li>"+r+"</li>").join("") + "</ul>";

    body.append(photos, names, gout, reg);
    modal.append(head, body);

    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
    close.focus();
  }

  function closeModal(){
    overlay.classList.remove("open");
    document.body.style.overflow = "";
    if(lastFocus) lastFocus.focus();
  }

  overlay.addEventListener("click", e=>{ if(e.target===overlay) closeModal(); });
  document.addEventListener("keydown", e=>{
    if(e.key==="Escape" && overlay.classList.contains("open")) closeModal();
  });

  searchEl.addEventListener("input", ()=>{
    query = norm(searchEl.value.trim());
    render();
  });

  buildChips();
  render();
})();
</script>
</body>
</html>
